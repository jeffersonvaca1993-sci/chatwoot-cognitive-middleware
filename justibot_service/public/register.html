<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - Justibot</title>
    <style>
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .auth-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 350px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }

        button:hover {
            background: #2980b9;
        }

        .link {
            text-align: center;
            margin-top: 15px;
            display: block;
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .link:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <h2>Crear Cuenta</h2>
        <p style="text-align: center; color: #666; font-size: 14px; margin-bottom: 20px;">Guarda tu historial para
            siempre.</p>
        <div class="form-group">
            <input type="text" id="name" placeholder="Nombre completo">
        </div>
        <div class="form-group">
            <input type="email" id="email" placeholder="Correo electrónico">
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Contraseña">
        </div>
        <button onclick="handleRegister()">Registrarse</button>
        <a href="login.html" class="link">¿Ya tienes cuenta? Inicia Sesión</a>
        <a href="index.html" class="link">Volver al chat</a>
    </div>

    <script src="js/auth.js"></script>
    <script>
        async function handleRegister() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!name || !email || !password) {
                alert("Por favor completa todos los campos");
                return;
            }

            try {
                await doRegister(name, email, password);
                alert("Cuenta creada exitosamente");
                window.location.href = 'index.html';
            } catch (e) {
                alert(e.message);
            }
        }
    </script>
</body>

</html>
