<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte - Justibot</title>
    <style>
        /* Estilos Base */
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Contenedor del Chat */
        .chat-container {
            width: 100%;
            max-width: 400px;
            height: 100vh;
            max-height: 600px;
            background: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Header */
        .chat-header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-title {
            font-weight: bold;
        }

        .auth-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            margin-left: 5px;
        }

        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        /* Warning Banner */
        .warning-banner {
            background-color: #fff3cd;
            color: #856404;
            padding: 8px;
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid #ffeeba;
            display: none;
        }

        /* Lista de Mensajes */
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 14px;
            font-size: 14px;
            line-height: 1.4;
            position: relative;
        }

        .message.incoming {
            /* Mensaje del usuario */
            align-self: flex-end;
            background-color: #3498db;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .message.outgoing {
            /* Mensaje del agente */
            align-self: flex-start;
            background-color: #e5e5ea;
            color: black;
            border-bottom-left-radius: 2px;
        }

        /* Input Area */
        .chat-input-area {
            padding: 15px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="chat-header">
            <div style="display: flex; flex-direction: column;">
                <span class="header-title">Justibot Soporte</span>
                <span id="currentUserDisplay" style="font-size: 12px; color: #f1c40f; font-weight: bold;">Cargando
                    usuario...</span>
            </div>
            <div id="authButtons" style="display:none;">
                <button class="auth-btn" onclick="location.href='register.html'">Ser Cliente</button>
                <button class="auth-btn" onclick="location.href='login.html'">Soy Cliente</button>
            </div>
            <button id="btnLogout" class="auth-btn" onclick="doLogout()" style="display:none;">Salir</button>
        </div>

        <div id="guestWarning" class="warning-banner">
            Chat anónimo: Los mensajes se borrarán en 7 días.
        </div>

        <div class="chat-messages" id="messagesList">
            <div style="text-align: center; color: #888; margin-top: 20px;">Conectando...</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Escribe un mensaje..." disabled>
            <button id="sendButton" disabled>Enviar</button>
        </div>
    </div>

    <script src="js/chat.js?v=10"></script>
</body>

</html>
